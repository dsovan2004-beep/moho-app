# ── MoHoLocal Ingestion Worker — Cloudflare Worker Configuration ──────────────
name              = "moho-ingestion"
main              = "ingestion-worker.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ── Cron Triggers ─────────────────────────────────────────────────────────────
# All times UTC.  Sequence is intentional — each job runs 1 hour apart so
# Supabase write load is spread out and logs are easy to distinguish in Dash.
[triggers]
crons = [
  "0 3 * * 1",   # Monday 03:00 UTC — Directory ingestion
  "0 4 * * 1",   # Monday 04:00 UTC — Events ingestion (weekly refresh)
  "0 5 * * 1",   # Monday 05:00 UTC — Lost & Found ingestion
  "0 4 * * 4",   # Thursday 04:00 UTC — Events ingestion (mid-week refresh)
]

# ── Non-secret vars (safe to commit) ─────────────────────────────────────────
[vars]
SUPABASE_URL = "https://ozjlfgipfzykzrjakwzb.supabase.co"
APP_ENV      = "production"
# Optional: set to a public HTTPS URL returning a JSON array of business records
# (e.g. a GitHub raw file or Cloudflare R2 object).
# MANUAL_BUSINESS_FEED_URL = "https://raw.githubusercontent.com/dsovan2004-beep/moho-app/main/data/businesses.json"

# ── Secrets — set via wrangler CLI (never commit these) ──────────────────────
# Run from the /workers directory:
#
# REQUIRED (worker will not run without this):
#   npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#
# DEFAULT SOURCES run without any secrets — they use public RSS feeds from:
#   - Official city websites (Tracy, Manteca, Lathrop, Brentwood, Mountain House)
#   - Tracy Press RSS        (tracypress.com/feed)
#   - 209 Times RSS          (209times.com/feed)
#   - Patch.com RSS          (patch.com/california/[city]/rss.xml)
#   - Chamber of Commerce RSS (where available)
#   - Manual curated feed    (set MANUAL_BUSINESS_FEED_URL var below if using)
#
# OPTIONAL THIRD-PARTY ADAPTERS — only add if explicitly approved:
#   npx wrangler secret put YELP_API_KEY               # Yelp Fusion API
#   npx wrangler secret put EVENTBRITE_API_KEY         # Eventbrite API
#   npx wrangler secret put PETFINDER_CLIENT_ID        # PetFinder API
#   npx wrangler secret put PETFINDER_CLIENT_SECRET    # PetFinder API
#
# Each optional adapter checks for its own key at runtime and skips gracefully
# if absent. The worker is fully operational without any of them.

# ── Observability ─────────────────────────────────────────────────────────────
# View logs in real time: wrangler tail
# View in Cloudflare Dashboard: Workers & Pages → moho-ingestion → Logs

# ── Local development ─────────────────────────────────────────────────────────
# Test scheduled event: wrangler dev --test-scheduled
# Then POST:           curl "http://localhost:8787/__scheduled?cron=0+3+*+*+1"
